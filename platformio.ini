; platform = espressif32
; board = esp32dev
; framework = arduino


[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

lib_deps =
    knolleary/PubSubClient @ ^2.8

upload_speed = 115200
monitor_speed = 115200
upload_port = COM8
monitor_port = COM8
monitor_dtr = 0
monitor_rts = 0

build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CORE_DEBUG_LEVEL=0
    -O2                      ; Optimize for speed/size

; Include src, exclude test directories
build_src_filter =
    +<*>
    -<../test>

; Partition scheme (default is fine for this project)
board_build.partitions = default.csv

; Reduce code size
build_unflags = -Os

[env:hardware_test]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

upload_port = COM8
monitor_port = COM8
upload_speed = 115200
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0

build_flags = 
    -O2


; Only compile the test file (excludes main.cpp)
build_src_filter = 
    -<*>
    +<../test/hardware_test/*>

[env:stepper_motor_test]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

upload_port = COM8
monitor_port = COM8
upload_speed = 115200
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -O2



; Compile only the stepper hardware test file from test/stepper_motor_test

build_src_filter =
    -<*>
    +<../test/stepper_motor_test/*>

[env:wifi_connect_test]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

lib_deps =
    knolleary/PubSubClient @ ^2.8

upload_speed = 115200
monitor_speed = 115200
upload_port = COM8
